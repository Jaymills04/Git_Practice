<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="A simple browser Tetris game — play in any tab.">
  <title>Simple Tetris</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header>
      <h1>Simple Tetris</h1>
    </header>

    <main class="game-area">
      <div class="board-wrap">
        <canvas id="board" width="300" height="600" aria-label="Tetris playfield"></canvas>
        <div id="overlay" class="overlay hidden" aria-live="polite"></div>
      </div>

      <aside class="hud">
        <div class="stat">
          <span class="stat-label">Score</span>
          <span id="score" class="stat-value">0</span>
        </div>
        <div class="stat">
          <span class="stat-label">Level</span>
          <span id="level" class="stat-value">1</span>
        </div>
        <div class="stat">
          <span class="stat-label">Lines</span>
          <span id="lines" class="stat-value">0</span>
        </div>
        <div class="next-wrap">
          <span class="stat-label">Next</span>
          <canvas id="next" width="120" height="120" aria-label="Next piece preview"></canvas>
        </div>
      </aside>
    </main>

    <section class="controls" aria-label="Game controls">
      <button type="button" id="btn-left" aria-label="Move left">◀</button>
      <button type="button" id="btn-right" aria-label="Move right">▶</button>
      <button type="button" id="btn-down" aria-label="Soft drop">▼</button>
      <button type="button" id="btn-rotate" aria-label="Rotate">↻</button>
      <button type="button" id="btn-hard" aria-label="Hard drop">⬇⬇</button>
      <button type="button" id="btn-pause" aria-label="Pause or resume">Pause</button>
      <button type="button" id="btn-restart" aria-label="Restart game">Restart</button>
    </section>

    <section class="help">
      <p><strong>Keyboard:</strong> ← → or A/D move · ↓ or S soft drop · ↑ W X rotate · Space hard drop · P pause · R restart</p>
    </section>
  </div>

  <script src="game.js"></script>
</body>
</html>
